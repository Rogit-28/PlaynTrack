version: '3.8'

services:
  db:
    image: postgres:13
    container_name: postgres_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=playntrack
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - app-network

  backend:
    build:
      context: ./app
    container_name: backend_service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/playntrack
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: frontend_service
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./dashboard:/app
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: